<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Collections | Lumina Jewellery</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Lumina Jewellery</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="collections.html">Collections</a></li>
                    <li class="nav-item"><a class="nav-link" href="about-us.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="bg-light text-center py-5">
        <h1>Our Collections</h1>
        <p class="text-muted">Elegance crafted for every occasion</p>
    </div>

    <!-- Products -->
    <div class="container my-5">
        <div class="row g-4">

            <div class="col-md-4">
                <div class="card shadow-sm">
                    <img src="images/necklace.png" class="card-img-top" alt="Diamond necklace">
                    <div class="card-body text-center">
                        <h5 class="card-title">Diamond Necklace</h5>
                        <p class="text-warning fw-bold">₹45,000</p>
                        <button class="btn btn-dark">View Details</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm">
                    <img src="images/ring.png" class="card-img-top" alt="Gold ring">
                    <div class="card-body text-center">
                        <h5 class="card-title">Gold Ring</h5>
                        <p class="text-warning fw-bold">₹18,000</p>
                        <button class="btn btn-dark">View Details</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm">
                    <img src="images/earring.png" class="card-img-top" alt="Pearl earrings">
                    <div class="card-body text-center">
                        <h5 class="card-title">Pearl Earrings</h5>
                        <p class="text-warning fw-bold">₹12,500</p>
                        <button class="btn btn-dark">View Details</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
        © 2026 Lumina Jewellery
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</html>
