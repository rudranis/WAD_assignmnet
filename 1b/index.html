<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>College Registration Form</h2>

    <form>

        <div class="row">
            <div class="field">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter full name">
                <small class="error" id="nameErr"></small>
            </div>

            <div class="field">
                <label>Roll Number</label>
                <input type="text" id="roll" placeholder="Enter roll number">
                <small class="error" id="rollErr"></small>
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>PRN Number</label>
                <input type="text" id="prn" placeholder="Enter PRN number">
                <small class="error" id="prnErr"></small>
            </div>

            <div class="field">
                <label>Date of Birth</label>
                <input type="date" id="dob">
                <small class="error" id="dobErr"></small>
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Mobile Number</label>
                <input type="text" id="mobile" placeholder="10 digit mobile number">
                <small class="error" id="mobileErr"></small>
            </div>

            <div class="field">
                <label>Email ID</label>
                <input type="email" id="email" placeholder="example@gmail.com">
                <small class="error" id="emailErr"></small>
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Password</label>
                <input type="password" id="password" placeholder="Strong password">
                <button type="button" id="togglePassword">show</button>
                <small class="error" id="passwordErr"></small>
            </div>

            <div class="field">
                <label>Gender</label>
                <div class="radio">
                    <input type="radio" name="gender" value="Male"> Male
                    <input type="radio" name="gender" value="Female"> Female
                </div>
                <small class="error" id="genderErr"></small>
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Department</label>
                <select id="dept">
                    <option value="">Select Department</option>
                    <option>IT</option>
                    <option>Computer</option>
                    <option>ENTC</option>
                    <option>Mechanical</option>
                </select>
                <small class="error" id="deptErr"></small>
            </div>

            <div class="field">
                <label>Year</label>
                <select id="year">
                    <option value="">Select Year</option>
                    <option>FE</option>
                    <option>SE</option>
                    <option>TE</option>
                    <option>BE</option>
                </select>
                <small class="error" id="yearErr"></small>
            </div>
        </div>

        <div class="field">
            <label>City</label>
            <select id="city">
                <option value="">Select City</option>
                <option>Pune</option>
                <option>Mumbai</option>
                <option>Delhi</option>
                <option>Bangalore</option>
            </select>
            <small class="error" id="cityErr"></small>
        </div>

        
        <div class="field">
            <label>Address</label>
            <textarea id="address" placeholder="Enter address"></textarea>
            <small class="error" id="addressErr"></small>
        </div>

        <div class="field">
            <label>Hobbies</label>
            <div class="checkbox">
                <input type="checkbox" value="Reading"> Reading
                <input type="checkbox" value="Sports"> Sports
                <input type="checkbox" value="Music"> Music
                <input type="checkbox" id="otherChk" onclick="toggleOther()"> Other
            </div>
            <input type="text" id="otherHobby" placeholder="Specify other hobby" disabled>
            <small class="error" id="hobbyErr"></small>
        </div>

        <button type="button" onclick="submitForm()">Register</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
